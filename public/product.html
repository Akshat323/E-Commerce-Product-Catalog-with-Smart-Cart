<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Product details — view specifications, reviews, and add to your smart cart.">
  <title>Product Detail — NovaMart</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- ─── Navigation ──────────────────────────────────────────── -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="/" class="navbar-brand">
        <div class="logo-icon">⚡</div>
        NovaMart
      </a>
      <ul class="navbar-nav">
        <li><a href="/" class="nav-link" id="nav-home">🏠 Home</a></li>
        <li><a href="/cart.html" class="nav-link" id="nav-cart">🛒 Cart <span class="cart-badge" id="cart-badge">0</span></a></li>
      </ul>
    </div>
  </nav>

  <!-- ─── Toast Container ─────────────────────────────────────── -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ─── Main Content ────────────────────────────────────────── -->
  <main class="main-content">
    <div class="page-header">
      <div class="breadcrumb">
        <a href="/">Home</a>
        <span class="separator">›</span>
        <span id="breadcrumb-type">Products</span>
        <span class="separator">›</span>
        <span id="breadcrumb-name">...</span>
      </div>
    </div>

    <!-- Product Detail -->
    <div class="product-detail" id="product-detail">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>

    <!-- Reviews Section -->
    <section class="reviews-section" id="reviews-section" style="display:none;">
      <div class="section-header">
        <h2 class="section-title">💬 Customer Reviews</h2>
        <span class="section-subtitle" id="review-count-text"></span>
      </div>

      <!-- Review Form -->
      <div class="review-form" id="review-form">
        <h3>Write a Review</h3>
        <div class="form-group">
          <label>Your Rating</label>
          <div class="star-rating-input" id="star-rating-input">
            <button class="star-btn" data-rating="1">★</button>
            <button class="star-btn" data-rating="2">★</button>
            <button class="star-btn" data-rating="3">★</button>
            <button class="star-btn" data-rating="4">★</button>
            <button class="star-btn" data-rating="5">★</button>
          </div>
        </div>
        <div class="form-group">
          <label for="review-comment">Your Review</label>
          <textarea class="form-control" id="review-comment" rows="3" placeholder="Share your thoughts about this product..."></textarea>
        </div>
        <button class="filter-btn filter-btn-primary" id="btn-submit-review">Submit Review</button>
      </div>

      <!-- Reviews List -->
      <div id="reviews-list"></div>
    </section>

  </main>

  <script src="/js/product.js"></script>
</body>
</html>
